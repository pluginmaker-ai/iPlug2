name: Alert on CMake CI failure

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CMake CI"]
    types: [completed]
    branches: [master]

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Post Slack alert
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_ALERTS_WEBHOOK_URL not set"
            exit 0
          fi
          jq -n '{text: ":rotating_light: Test alert (workflow_run added)"}' | \
            curl -sf -X POST "$SLACK_WEBHOOK" -H "Content-Type: application/json" -d @-
