name: Notify CMake pass

on:
  workflow_run:
    workflows: ["CMake CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: notify-cmake-pass
  cancel-in-progress: false

jobs:
  post:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Post Slack success
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo skip; exit 0; fi
          SHORT_SHA="${SHA:0:12}"
          TEXT=":white_check_mark: iPlug2 master CMake CI passed on \`$SHORT_SHA\`
          <$RUN_URL|View CI run>

          Auto-bump PR on pluginmaker-ai/alexh is being opened..."
          jq -n --arg text "$TEXT" '{text: $text}' | \
            curl -sf -X POST "$SLACK_WEBHOOK" -H "Content-Type: application/json" -d @-
