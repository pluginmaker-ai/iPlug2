name: Alert on CMake CI failure

# Posts a Slack alert when CMake CI fails on master. Master being broken is
# what pauses the pluginmaker-ai/alexh auto-bump workflow — without this
# alert, nobody would know master is red until the next release or build.
#
# Requires a repository secret SLACK_ALERTS_WEBHOOK_URL (same name as alexh
# uses). If the secret isn't set, the workflow logs and exits cleanly.

on:
  workflow_run:
    workflows: ["CMake CI"]
    types: [completed]
    branches: [master]

jobs:
  alert:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Post Slack alert
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          AUTHOR: ${{ github.event.workflow_run.head_commit.author.username }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_ALERTS_WEBHOOK_URL not set — skipping alert"
            exit 0
          fi
          SHORT_SHA="${SHA:0:12}"
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -1 | cut -c1-120)
          TEXT=":rotating_light: *iPlug2 master broken* — CMake CI failed on \`$SHORT_SHA\`
<$RUN_URL|View CI run> · ${SUBJECT} (by @$AUTHOR)

Auto-bump to pluginmaker-ai/alexh is paused until master is green again. Fix master, then trigger the bump manually via \`gh workflow run bump-alexh-pin.yml\` or by merging a passing commit."
          jq -n --arg text "$TEXT" '{text: $text}' | \
            curl -sf -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d @-
