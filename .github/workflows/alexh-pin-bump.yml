name: Bump iPlug2 pin in pluginmaker-ai/alexh

# Runs after CMake CI succeeds on master. Opens (or updates) a PR on
# pluginmaker-ai/alexh that bumps backend/services/native-build/iplug2.sha to
# the new master tip. Merging that PR triggers the alexh deploy workflow, which
# rolls the new iPlug2 out to the Mac mini + Windows build workers.
#
# Gating on CMake CI means a broken master never propagates -- no wasted Mac mini
# deploys, no red smoke-test failures. If CMake CI is skipped (e.g. docs-only
# change where nothing C++ moved), the bump is also skipped, which is correct:
# nothing affects plugin builds so there's nothing to deploy.
#
# Requires a repository secret ALEXH_PR_TOKEN -- a GitHub token with
# `contents: write` and `pull-requests: write` scoped to pluginmaker-ai/alexh.

on:
  workflow_run:
    workflows: ["CMake CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: bump-alexh-pin
  cancel-in-progress: false

jobs:
  bump-pin:
    # Only proceed when CMake CI succeeded, or when triggered manually.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Compute commit metadata
        id: meta
        env:
          # workflow_run exposes the triggering commit under workflow_run.*
          # workflow_dispatch falls back to github.sha / head_commit
          FULL_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message }}
        run: |
          echo "sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "short=${FULL_SHA:0:12}" >> "$GITHUB_OUTPUT"
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -1 | cut -c1-72)
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

      - name: Checkout pluginmaker-ai/alexh
        uses: actions/checkout@v4
        with:
          repository: pluginmaker-ai/alexh
          token: ${{ secrets.ALEXH_PR_TOKEN }}
          path: alexh
          ref: main

      - name: Update iPlug2 SHA pin
        env:
          NEW_SHA: ${{ steps.meta.outputs.sha }}
        run: |
          echo "$NEW_SHA" > alexh/backend/services/native-build/iplug2.sha
          cat alexh/backend/services/native-build/iplug2.sha

      - name: Open or update bump PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          path: alexh
          token: ${{ secrets.ALEXH_PR_TOKEN }}
          base: main
          branch: auto/bump-iplug2-to-${{ steps.meta.outputs.short }}
          delete-branch: true
          commit-message: |
            native-build: bump iPlug2 pin to ${{ steps.meta.outputs.short }}

            Upstream commit: ${{ steps.meta.outputs.subject }}
            Full SHA: ${{ steps.meta.outputs.sha }}
          title: "Bump iPlug2 to ${{ steps.meta.outputs.short }} -- ${{ steps.meta.outputs.subject }}"
          body: |
            Auto-bump of `backend/services/native-build/iplug2.sha`. iPlug2's
            CMake CI passed on this commit, so the new master tip has already
            been validated. Auto-merge is enabled -- this PR lands as soon as
            alexh CI passes.

            - **New iPlug2 commit:** [`${{ steps.meta.outputs.short }}`](https://github.com/pluginmaker-ai/iPlug2/commit/${{ steps.meta.outputs.sha }})
            - **Subject:** ${{ steps.meta.outputs.subject }}

            On merge, `deploy-native-build.yml` picks this up and both the Mac
            mini and Windows build workers switch to the new iPlug2 on their
            next deploy. The per-SHA build cache will be cold for the first
            user build of each plugin type after the bump.

            Generated by `.github/workflows/bump-alexh-pin.yml` in the iPlug2
            fork.
          labels: |
            iplug2-bump
            auto-generated

      - name: Enable auto-merge on the bump PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.ALEXH_PR_TOKEN }}
        run: |
          gh pr merge \
            --repo pluginmaker-ai/alexh \
            --auto --squash \
            "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Notify Slack that bump PR was opened
        # Only fire on brand-new PRs, not when create-pull-request updates an
        # existing open PR with a newer commit.
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          SHORT: ${{ steps.meta.outputs.short }}
          SUBJECT: ${{ steps.meta.outputs.subject }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_ALERTS_WEBHOOK_URL not set -- skipping"
            exit 0
          fi
          TEXT=":robot_face: *iPlug2 auto-bump PR opened* -> \`$SHORT\`
<$PR_URL|PR #$PR_NUMBER> | $SUBJECT
Auto-merges once alexh CI passes; native-build deploy follows."
          jq -n --arg text "$TEXT" '{text: $text}' | \
            curl -sf -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d @-
