name: Bump iPlug2 pin in pluginmaker-ai/alexh

# Runs on every push to master of this fork. Opens (or updates) a PR on
# pluginmaker-ai/alexh that bumps backend/services/native-build/iplug2.sha to
# the new master tip. Merging that PR triggers the alexh deploy workflow, which
# rolls the new iPlug2 out to the Mac mini + Windows build workers.
#
# Requires a repository secret ALEXH_PR_TOKEN — a GitHub token (classic PAT or
# fine-grained) with `contents: write` and `pull-requests: write` scoped to
# pluginmaker-ai/alexh.

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: bump-alexh-pin
  cancel-in-progress: false

jobs:
  bump-pin:
    runs-on: ubuntu-latest
    steps:
      - name: Compute commit metadata
        id: meta
        env:
          FULL_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "short=${FULL_SHA:0:12}" >> "$GITHUB_OUTPUT"
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -1 | cut -c1-72)
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

      - name: Checkout pluginmaker-ai/alexh
        uses: actions/checkout@v4
        with:
          repository: pluginmaker-ai/alexh
          token: ${{ secrets.ALEXH_PR_TOKEN }}
          path: alexh
          ref: main

      - name: Update iPlug2 SHA pin
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          echo "$NEW_SHA" > alexh/backend/services/native-build/iplug2.sha
          cat alexh/backend/services/native-build/iplug2.sha

      - name: Open or update bump PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: alexh
          token: ${{ secrets.ALEXH_PR_TOKEN }}
          base: main
          branch: auto/bump-iplug2-to-${{ steps.meta.outputs.short }}
          delete-branch: true
          commit-message: |
            native-build: bump iPlug2 pin to ${{ steps.meta.outputs.short }}

            Upstream commit: ${{ steps.meta.outputs.subject }}
            Full SHA: ${{ github.sha }}
          title: "Bump iPlug2 to ${{ steps.meta.outputs.short }} — ${{ steps.meta.outputs.subject }}"
          body: |
            Auto-bump of `backend/services/native-build/iplug2.sha` triggered by
            a new push to master on `pluginmaker-ai/iPlug2`.

            - **New iPlug2 commit:** [`${{ steps.meta.outputs.short }}`](https://github.com/pluginmaker-ai/iPlug2/commit/${{ github.sha }})
            - **Subject:** ${{ steps.meta.outputs.subject }}
            - **Pushed by:** @${{ github.actor }}

            On merge, `deploy-native-build.yml` picks this up and both the Mac
            mini and Windows build workers switch to the new iPlug2 on their
            next deploy. The per-SHA build cache will be cold for the first
            user build of each plugin type after the bump.

            Generated by `.github/workflows/bump-alexh-pin.yml` in the iPlug2
            fork.
          labels: |
            iplug2-bump
            auto-generated
