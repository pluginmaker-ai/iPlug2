name: Notify CMake fail

on:
  workflow_run:
    workflows: ["CMake CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: notify-cmake-fail
  cancel-in-progress: false

jobs:
  post:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Post Slack alert
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo skip; exit 0; fi
          SHORT_SHA="${SHA:0:12}"
          TEXT=":rotating_light: iPlug2 master broken -- CMake CI failed on \`$SHORT_SHA\`
          <$RUN_URL|View CI run>

          Auto-bump to pluginmaker-ai/alexh is paused until master is green again."
          jq -n --arg text "$TEXT" '{text: $text}' | \
            curl -sf -X POST "$SLACK_WEBHOOK" -H "Content-Type: application/json" -d @-
